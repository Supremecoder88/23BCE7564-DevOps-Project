apiVersion: apps/v1
kind: Deployment
metadata:
  name: techsymp-deployment
  labels:
    app: techsymp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: techsymp
  template:
    metadata:
      labels:
        app: techsymp
    spec:
      containers:
      - name: techsymp-container
        image: techsymp-website:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: techsymp-service
spec:
  selector:
    app: techsymp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001
  type: NodePort
